name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build portable Windows release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build portable app
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_portable.ps1

      - name: Package portable app
        shell: pwsh
        run: |
          $zipName = "YouTube-Download-Helper-${{ github.ref_name }}-windows-portable.zip"
          Compress-Archive -Path "dist\YouTube Download Helper\*" -DestinationPath $zipName -Force
          "RELEASE_ZIP=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "$env:RELEASE_ZIP" --title "${{ github.ref_name }}" --generate-notes
